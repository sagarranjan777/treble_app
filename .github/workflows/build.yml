name: Build Treble App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: |
          git clone https://github.com/phhusson/treble_app.git

      - name: Patch OppoSettings
        run: |
          sed -i 's/ || Tools.oppoPrjName.contains("19531")//' \
          treble_app/app/src/main/java/me/phh/treble/app/OppoSettings.kt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: treble_app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: treble_app-debug
          path: treble_app/app/build/outputs/apk/debug/*.apk
